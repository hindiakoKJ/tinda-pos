<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 500" width="1024" height="500">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0E8A82;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0B6F68;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="1024" height="500" fill="url(#bg)"/>

  <!-- Decorative circles -->
  <circle cx="900" cy="80" r="180" fill="#5FD3C8" opacity="0.25"/>
  <circle cx="950" cy="420" r="120" fill="#08504B" opacity="0.15"/>
  <circle cx="80" cy="430" r="100" fill="#08504B" opacity="0.10"/>

  <!-- App icon (bag) centered-left -->
  <rect x="80" y="140" width="220" height="220" rx="40" fill="white" opacity="0.15"/>
  <rect x="96" y="156" width="188" height="188" rx="32" fill="white"/>

  <!-- Bag body -->
  <path d="M136 236 L252 236 L238 308 H150 Z" fill="#0E8A82"/>
  <!-- Bag handle -->
  <path d="M158 236 C158 196 190 182 190 182 C190 182 222 196 222 236"
        fill="none" stroke="#0E8A82" stroke-width="14" stroke-linecap="round"/>
  <!-- Peso sign -->
  <text x="190" y="285"
        text-anchor="middle"
        dominant-baseline="middle"
        font-family="Arial Black, Arial, sans-serif"
        font-size="52"
        font-weight="900"
        fill="white">₱</text>

  <!-- App name -->
  <text x="340" y="210"
        font-family="Arial Black, Arial, sans-serif"
        font-size="80"
        font-weight="900"
        fill="white">SariAssist</text>

  <!-- Tagline -->
  <text x="342" y="268"
        font-family="Arial, Helvetica, sans-serif"
        font-size="28"
        font-weight="400"
        fill="white"
        opacity="0.92">Ang POS ng bawat tindahan</text>

  <!-- Feature pills -->
  <rect x="342" y="310" width="160" height="40" rx="20" fill="white" opacity="0.2"/>
  <text x="422" y="335" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="white">📴 Offline-first</text>

  <rect x="516" y="310" width="160" height="40" rx="20" fill="white" opacity="0.2"/>
  <text x="596" y="335" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="white">🔒 Walang cloud</text>

  <rect x="690" y="310" width="180" height="40" rx="20" fill="white" opacity="0.2"/>
  <text x="780" y="335" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="white">⚡ Mabilis na POS</text>

  <!-- Bottom tagline -->
  <text x="342" y="400"
        font-family="Arial, Helvetica, sans-serif"
        font-size="20"
        fill="white"
        opacity="0.80">Simple. Mabilis. Para sa lahat ng tindahan.</text>
</svg>
